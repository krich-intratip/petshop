<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Peakmaker Cat Shop">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8dff5"/>
      <stop offset="45%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b7ecf"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#3d3557" flood-opacity="0.22"/>
    </filter>
  </defs>
  <!-- rounded tile -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="0.75"/>
  <!-- paw: reads clearly at 16–32px -->
  <g fill="#fff" fill-opacity="0.95" filter="url(#soft)">
    <ellipse cx="16" cy="20.5" rx="5" ry="3.6"/>
    <circle cx="11.2" cy="12.2" r="2.05"/>
    <circle cx="16" cy="10.3" r="2.15"/>
    <circle cx="20.8" cy="12.2" r="2.05"/>
  </g>
  <!-- mint accent dot -->
  <circle cx="24" cy="8" r="2" fill="#5ec4d4" opacity="0.95"/>
  <circle cx="24" cy="8" r="2" fill="none" stroke="#fff" stroke-opacity="0.6" stroke-width="0.4"/>
</svg>
